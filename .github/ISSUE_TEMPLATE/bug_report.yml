name: "Bug report"
description: "Report a reproducible bug in Find"
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include enough detail so contributors can reproduce it quickly.
  - type: textarea
    id: summary
    attributes:
      label: Bug summary
      description: What is broken?
      placeholder: Short and clear problem statement
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Exact steps from a clean state
      placeholder: |
        1. Go to ...
        2. Click ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: What happened instead?
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Paste stack traces, API responses, or screenshots if available.
      render: shell
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: OS, Docker/local mode, browser, commit SHA
